const ITER=600000;
const b=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
const salt=b.slice(0,16),iv=b.slice(16,28),data=b.slice(28);
async function tryUnlock(pass){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,data);
  return new TextDecoder().decode(pt);
}
async function unlock(pass,fromStore){
  try{
    const html=await tryUnlock(pass);
    sessionStorage.setItem('wm_pass',pass);
    document.open();document.write(html);document.close();
  }catch(e){
    if(fromStore){sessionStorage.removeItem('wm_pass');return;}
    document.getElementById('err').style.display='block';
    document.getElementById('go').disabled=false;
  }
}
document.getElementById('f').addEventListener('submit',e=>{
  e.preventDefault();document.getElementById('go').disabled=true;
  unlock(document.getElementById('pw').value,false);
});
const saved=sessionStorage.getItem('wm_pass');
if(saved)unlock(saved,true);
